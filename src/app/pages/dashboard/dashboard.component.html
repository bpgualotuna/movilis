<div class="dashboard-container">
  <!-- SIDEBAR (Barra lateral para pantallas medianas/grandes) -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="assets/logoMovilis.png" alt="Logo Movilis" class="logo" />
      <div class="header-text">
        <span class="brand-name">MOVILIS</span>
        <span class="brand-tagline">Instituto Superior</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <ul>
        <li>
          <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-item">
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span>Inicio</span>
          </a>
        </li>
        <li>
          <a routerLink="/registro" routerLinkActive="active" class="nav-item">
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <line x1="19" x2="19" y1="8" y2="14"/>
              <line x1="22" x2="16" y1="11" y2="11"/>
            </svg>
            <span>Ficha de Registro</span>
          </a>
        </li>
        <li>
          <a routerLink="/cobros" routerLinkActive="active" class="nav-item">
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" x2="12" y1="2" y2="22"/>
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
            <span>Módulo de Cobros</span>
          </a>
        </li>
        <li>
          <a routerLink="/reportes" routerLinkActive="active" class="nav-item">
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" x2="18" y1="20" y2="10"/>
              <line x1="12" x2="12" y1="20" y2="4"/>
              <line x1="6" x2="6" y1="20" y2="14"/>
            </svg>
            <span>Módulo de Reportes</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <span class="developer-label">Desarrollado por:</span>
      <img src="assets/logoKrake.png" alt="Krake Dev" class="developer-logo" />
      <span class="copyright">© {{ currentYear }} Movilis</span>
    </div>
  </aside>

  <!-- NAVBAR MOBILE (Visible solo en móviles/tablets) -->
  <header class="mobile-navbar">
    <button class="menu-toggle" (click)="toggleMobileMenu()" aria-label="Abrir menú de navegación">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" x2="20" y1="12" y2="12"/>
        <line x1="4" x2="20" y1="6" y2="6"/>
        <line x1="4" x2="20" y1="18" y2="18"/>
      </svg>
    </button>
    <div class="mobile-logo-container">
      <img src="assets/logoMovilis.png" alt="Logo Movilis" class="logo-mobile" />
      <span class="mobile-title">MOVILIS</span>
    </div>
    <div style="width: 24px;"></div> <!-- Spacer para balancear el layout -->
  </header>

  <!-- DRAWER MOBILE MENU (Menú colapsable en móviles) -->
  <div class="mobile-drawer-overlay" [class.open]="isMobileMenuOpen" (click)="closeMobileMenu()">
    <aside class="mobile-drawer" [class.open]="isMobileMenuOpen" (click)="$event.stopPropagation()">
      <div class="drawer-header">
        <img src="assets/logoMovilis.png" alt="Logo Movilis" class="logo" />
        <button class="close-btn" (click)="closeMobileMenu()" aria-label="Cerrar menú">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" x2="6" y1="6" y2="18"/>
            <line x1="6" x2="18" y1="6" y2="18"/>
          </svg>
        </button>
      </div>

      <nav class="drawer-nav">
        <ul>
          <li>
            <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMobileMenu()" class="nav-item">
              <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
              </svg>
              <span>Inicio</span>
            </a>
          </li>
          <li>
            <a routerLink="/registro" routerLinkActive="active" (click)="closeMobileMenu()" class="nav-item">
              <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <line x1="19" x2="19" y1="8" y2="14"/>
                <line x1="22" x2="16" y1="11" y2="11"/>
              </svg>
              <span>Ficha de Registro</span>
            </a>
          </li>
          <li>
            <a routerLink="/cobros" routerLinkActive="active" (click)="closeMobileMenu()" class="nav-item">
              <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" x2="12" y1="2" y2="22"/>
                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
              </svg>
              <span>Módulo de Cobros</span>
            </a>
          </li>
          <li>
            <a routerLink="/reportes" routerLinkActive="active" (click)="closeMobileMenu()" class="nav-item">
              <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" x2="18" y1="20" y2="10"/>
                <line x1="12" x2="12" y1="20" y2="4"/>
                <line x1="6" x2="6" y1="20" y2="14"/>
              </svg>
              <span>Módulo de Reportes</span>
            </a>
          </li>
        </ul>
      </nav>

      <div class="drawer-footer">
        <span class="developer-label">Desarrollado por:</span>
        <img src="assets/logoKrake.png" alt="Krake Dev" class="developer-logo" />
        <span class="copyright">© {{ currentYear }} Movilis</span>
      </div>
    </aside>
  </div>

  <!-- CONTENEDOR PRINCIPAL (Donde se cargan los componentes) -->
  <main class="main-content">
    <div class="content-wrapper">
      <router-outlet />
    </div>
  </main>
</div>
